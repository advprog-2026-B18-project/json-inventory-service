name: Deploy Spring Boot Service
on:
  push:
    branches:
      - main
      - setup/ci-cd

env:
  SERVICE_NAME: inventory-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Add gradle permissions
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/advprog-2026-b18-project/json-inventory-service:latest

      # Dynamically generate the .env file on the GitHub Runner
      - name: Generate .env file
        env:
          DB_URL: ${{ secrets.DB_URL_INVENTORY }}
          DB_USER: ${{ secrets.DB_USER_INVENTORY }}
          DB_PASS: ${{ secrets.DB_PASS_INVENTORY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_KEY: ${{ secrets.INTERNAL_SERVICE_KEY }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_BUCKET: ${{ secrets.AWS_S3_BUCKET_NAME }}
        run: |
          echo "SPRING_DATASOURCE_URL=$DB_URL" >> .env
          echo "SPRING_DATASOURCE_USERNAME=$DB_USER" >> .env
          echo "SPRING_DATASOURCE_PASSWORD=$DB_PASS" >> .env
          echo "JWT_SECRET=$JWT_SECRET" >> .env
          echo "INTERNAL_SERVICE_KEY=$INTERNAL_KEY" >> .env
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY" >> .env
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_KEY" >> .env
          echo "AWS_SESSION_TOKEN=$AWS_TOKEN" >> .env
          echo "AWS_S3_BUCKET_NAME=$AWS_BUCKET" >> .env

      # Copy docker-compose.yml and the newly generated .env via scp
      - name: Copy files via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,.env"
          target: "/home/ubuntu/"

      # Deploy on EC2 
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ghcr.io/advprog-2026-b18-project/json-inventory-service:latest
            docker compose -f /home/ubuntu/docker-compose.yml up -d --no-deps --build ${{ env.SERVICE_NAME }}
            chmod 600 /home/ubuntu/.env
            docker image prune -af