spring.application.name=json-inventory-service
spring.datasource.url=${DB_URL_INVENTORY}
spring.datasource.username=${DB_USER_INVENTORY}
spring.datasource.password=${DB_PASS_INVENTORY}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
app.frontend.url=${FRONTEND_URL:http://localhost:5173,http://localhost:3000}
app.jwt.secret=${JWT_SECRET}
server.port=8083
spring.jackson.property-naming-strategy=SNAKE_CASE

# AWS S3 Configuration
aws.s3.access-key=${AWS_ACCESS_KEY_ID}
aws.s3.secret-key=${AWS_SECRET_ACCESS_KEY}
aws.s3.session-token=${AWS_SESSION_TOKEN}
aws.s3.region=us-east-1
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB